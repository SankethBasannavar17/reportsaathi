# ═══════════════════════════════════════════════
#  ReportSaathi — application.properties
#  This is the LOCAL / DEV config.
#  Never commit real secrets — use env vars in prod.
# ═══════════════════════════════════════════════

# ── App Info ──────────────────────────────────
spring.application.name=ReportSaathi
server.port=8080

# ── PostgreSQL Database ────────────────────────
# For local dev: install PostgreSQL and create a DB named "reportsaathi"
# Command: createdb reportsaathi
spring.datasource.url=jdbc:postgresql://localhost:5432/reportsaathi
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────
# create-drop: deletes and recreates tables on every restart (DEV ONLY)
# In production, change to: validate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT Settings ──────────────────────────────
# Secret must be at least 256 bits (32 chars) for HS256
# CHANGE THIS before deploying — generate with: openssl rand -hex 32
jwt.secret=reportsaathi_super_secret_key_change_this_in_production_2024
# Token expires in 7 days (milliseconds: 7 * 24 * 60 * 60 * 1000)
jwt.expiration=604800000

# ── Google Cloud Vision (OCR) ─────────────────
# Path to your service account JSON file downloaded from Google Cloud Console
# In prod, use GOOGLE_APPLICATION_CREDENTIALS env variable instead
google.cloud.vision.credentials-path=classpath:google-vision-credentials.json

# ── OpenAI API ────────────────────────────────
# Get from: https://platform.openai.com/api-keys
openai.api.key=sk-YOUR_OPENAI_API_KEY_HERE
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o

# ── Firebase ──────────────────────────────────
# Path to Firebase Admin SDK JSON downloaded from Firebase Console
firebase.credentials-path=classpath:firebase-credentials.json

# ── File Upload Limits ────────────────────────
# Max image size: 10MB (lab reports are usually 1-3MB after compression)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────
logging.level.com.reportsaathi=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
