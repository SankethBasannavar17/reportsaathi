# ═══════════════════════════════════════════════
#  ReportSaathi — application-prod.properties
#  Production config. ALL secrets come from
#  environment variables set in Railway/Render.
#  Activate with: --spring.profiles.active=prod
# ═══════════════════════════════════════════════

# ── PostgreSQL (Supabase connection string) ───
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# ── JPA ───────────────────────────────────────
# validate: only checks schema exists, never drops tables in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# ── OpenAI ────────────────────────────────────
openai.api.key=${OPENAI_API_KEY}

# ── Logging ───────────────────────────────────
logging.level.com.reportsaathi=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
